org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.jvm.options=-Xmx1024m
org.gradle.parallel=false
org.gradle.caching=true
# Make Gradle/JDK detection more automatic on fresh imports
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.fromEnv=JAVA_HOME

# Cloudinary config
# Apna Cloudinary cloud name aur unsigned upload preset yahan dalo
CLOUDINARY_CLOUD_NAME=dtnqffvzs
CLOUDINARY_UPLOAD_PRESET=blackchat_unsigned


# Firebase realtime backend switch
# google-services.json add karne ke baad true karo
REALTIME_BACKEND_ENABLED=true
